    <ul class="language">
        <li>Javascript</li>
    </ul>

<script>
  
           //EDIT
        const liItem = document.createElement('li') 
        const addText = document.createTextNode('REACT')
        liItem.appendChild(addText)
        document.querySelector('.language').appendChild(liItem)

        const li = document.createElement('li')
        const text = document.createTextNode('.NET')
        li.appendChild(text)
        const liTag = document.querySelector('.language')
        liTag.appendChild(li)

       const secondElement =  document.querySelector('li:nth-child(3)')
       secondElement.innerHTML = 'jjj'

       const newli = document.createElement('li')
       newli.innerHTML = 'Angular'
       secondElement.replaceWith(newli)


       const lastElement = document.querySelector('li:last-child')
       lastElement.remove();
